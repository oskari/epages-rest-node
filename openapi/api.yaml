  '/{shopId}/categories/{categoryId}/sequence':
    get:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - in: path
          name: categoryId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: array of strings
                title: Get Category CategoryId Sequence Schema
                type: object
          description: OK
      description: 'Returns the order of subcategories for the provided category ID as an array. If the category has no subcategories, an empty array will be returned. *epages6 *epagesNow'
    put:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - in: path
          name: categoryId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: array of strings
                title: Put Category CategoryId Sequence Schema
                type: object
          description: OK
      description: Updates the order of subcategories for the provided category ID. Note that it is only possible to change the order but not to delete a subcategory. *epages6 *epagesNow
      requestBody:
        content:
          application/json:
            schema:
              properties:
                '':
                  description: ''
                  type: array of strings
              title: Put Category CategoryId Sequence Request Schema
              type: object
        required: true
  '/{shopId}/countries':
    get:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
