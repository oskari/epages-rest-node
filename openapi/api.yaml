            type: string
        - name: shopId
          in: path
          schema:
            description: The unique identifier of the shop.
            example: DemoShop
            type: string
        - name: productTypeId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                title: Get Product Type TypeId Schema
                example:
                  value:
                    name: Headphones
                    productTypeId: 64180BCB-5AEF-4E69-4A92-AC150003B611
                    attributes:
                      - visible: true
                        name: Connectivity
                        values:
                          - value: Bluetooth
                            name: Bluetooth
