                type: object
                additionalProperties: true
                properties:
                  results:
                    description: The number of watched products in total.
                    type: integer
                  page:
                    description: The page number of the returned watched products.
                    type: integer
                  resultsPerPage:
                    description: The number of watched products returned per page.
                    type: integer
                  items:
                    description: The list of all watched products.
      security:
        - products_write: []
