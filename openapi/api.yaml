  /{shopId}/watched-products:
    x-amf-displayName: Watched products
    get:
      description: Returns a list of all watched products. Watched products refers to items currently out of stock and therefore can be watched by online shop customers. *epages6 *epagesNow
      parameters:
        - name: locale
          required: false
          in: query
          schema:
            description: Represents the language code according to ISO 639-1 and the country code according to ISO 3166-1. If not provided, the shop's default language is used. We recommend to always send this parameter with your request. If the default language had been changed in the administration, it might take up to 1 day until this change affects the shop.
            example: en_US
            type: string
        - name: page
          in: query
          schema:
            description: Represents the current page.
            default: 1
            type: integer
            minimum: 1
        - name: resultsPerPage
          in: query
          schema:
            description: Specifies the maximum number of results per page.
            default: 10
            type: integer
            maximum: 100
        - name: shopId
          in: path
          schema:
            description: The unique identifier of the shop.
            example: DemoShop
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                title: Get WatchedProducts Schema
                example:
                  results: 1
                  page: 1
                  resultsPerPage: 10
                  items:
                    - productId: 51E7F905-2E4C-78C2-30C2-AC14145FA4E5
                      name: Dr.Boom - Red Power
                      productNumber: HP-003
                      watchers: 1
                      links:
                        - rel: product
