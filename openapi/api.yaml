        Updates information for a single order with partial data according to [RFC 6902](https://tools.ietf.org/html/rfc6902). You can either add or remove certain attributes. Note that an order cannot be updated once it is in edit mode. In that case, response code 409 will appear. *epages6 *epagesNow <br><br>
        *Supported JSON-PATCH operations*<br> - add (sets or replaces an attribute)<br> - remove (unsets an attribute)<br><br>
        *Attribute paths that allow updates via PATCH*<br> - /orderNumber¹<br> - /customerComment<br> - /internalNote<br> - /billingAddress¹<br> - /shippingAddress¹<br> - /payment¹ ²<br> - /viewedOn<br> - /rejectedOn<br> - /inProcessOn<br> - /pendingOn<br> - /readyForDispatchOn<br> - /partiallyDispatchedOn<br> - /dispatchedOn<br> - /deliveredOn<br> - /partiallyInvoicedOn<br> - /invoicedOn<br> - /partiallyPaidOn<br> - /paidOn<br> - /returnedOn<br> - /closedOn<br> - /archivedOn<br><br>
        **¹** Supports *add* only<br> **²** By providing this attribute path in the request body, the attributes included in `paymentData` will be set to `null` and the related `price` will be changed to `0.00 €`. The attribute path `/payment` itself will not be included in the response. Instead, the provided value will be displayed as the payment method used for the order in the administration area of the merchant.
      parameters:
        - name: locale
          required: false
          in: query
          schema:
            description: Represents the language code according to ISO 639-1 and the country code according to ISO 3166-1. If not provided, the shop's default language is used. We recommend to always send this parameter with your request. If the default language had been changed in the administration, it might take up to 1 day until this change affects the shop.
            example: en_US
            type: string
        - name: shopId
          in: path
          schema:
            description: The unique identifier of the shop.
            example: DemoShop
            type: string
        - name: orderId
          required: true
          in: path
          schema:
            type: string
