        - description: 'Represents the language code according to ISO 639-1 and the country code according to ISO 3166-1. If not provided, the shop''s default language is used. We recommend to always send this parameter with your request. If the default language had been changed in the administration, it might take up to 1 day until this change affects the shop.'
          in: query
          name: locale
          required: false
          schema:
            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [subcategory](page:apps-data-types#subcategory)'
                title: Post Category Schema
                type: object
          description: OK
      description: Creates a subcategory to an existing category. Providing attributes in the request is optional. *epages6 *epagesNow
      requestBody:
        content:
          application/json:
            schema:
              properties:
                '':
                  description: ''
                  type: 'object of [category (create request)](page:apps-data-types#category-create-request)'
