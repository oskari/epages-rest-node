openapi: 3.0.0
info:
  title: ePages Public REST API
  version: v1
servers:
  - url: /rs
paths:
  /{shopId}:
    x-amf-displayName: Shop information
    get:
      description: Returns the public information of a shop, like name, slogan and logo. *epages6 *epagesNow
      parameters:
        - name: locale
          required: false
          in: query
          schema:
            description: Represents the language code according to ISO 639-1 and the country code according to ISO 3166-1. If not provided, the shop's default language is used. We recommend to always send this parameter with your request. If the default language had been changed in the administration, it might take up to 1 day until this change affects the shop.
            example: en_US
            type: string
        - name: shopId
          in: path
          schema:
            description: The unique identifier of the shop.
            example: DemoShop
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                title: Get ShopId Schema
                example:
                  name: Technic365
                  email: technic@technic365.com
                  slogan: <p>Make some noise</p>
                  logoUrl: https://pm.epages.com/WebRoot/Store/Shops/apidocu/MediaGallery/logo_technic365_3.png
                  sfUrl: http://pm.epages.com/epages/apidocu.sf/?ObjectPath=/Shops/Technic365
                  mboUrl: https://pm.epages.com/epages/apidocu.admin/?ObjectPath=/Shops/Technic365
                  isInEU: true
                  countryCode2: DE
                type: object
                additionalProperties: true
                properties:
                  '':
                    description: ''
      security:
        - products_read: []
  /{shopId}/carts:
    x-amf-displayName: Carts
    get:
      description: Returns a list of carts. *epages6 *epagesNow
      parameters:
        - name: createdAfter
          required: false
          in: query
          schema:
            description: Filters carts created after this timestamp (format according to ISO 8601). The maximum time frame for displaying carts is 30 days. If no filter is set, all carts will be displayed.
            type: string
        - name: page
          in: query
          schema:
            description: Represents the current page.
            default: 1
            type: integer
            minimum: 1
        - name: locale
          required: false
          in: query
          schema:
            description: Represents the language code according to ISO 639-1 and the country code according to ISO 3166-1. If not provided, the shop's default language is used. We recommend to always send this parameter with your request. If the default language had been changed in the administration, it might take up to 1 day until this change affects the shop.
            example: en_US
            type: string
        - name: createdBefore
          required: false
          in: query
          schema:
            description: Filters carts created before this timestamp (format according to ISO 8601). The maximum time frame for displaying carts is 30 days. If no filter is set, all carts will be displayed.
            type: string
        - name: hasAddressData
          required: false
          in: query
          schema:
            description: Returns carts that hold address data. If set to `false`, only the carts without address will be returned. If parameter is not set, all carts will be returned.
            type: boolean
        - name: resultsPerPage
          in: query
          schema:
            description: Specifies the maximum number of results per page.
            default: 10
            type: integer
            maximum: 100
        - name: shopId
          in: path
          schema:
            description: The unique identifier of the shop.
            example: DemoShop
            type: string
