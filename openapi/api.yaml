    patch:
      description: |-
        Updates information for a single product with partial data according to [RFC 6902](https://tools.ietf.org/html/rfc6902). You can either add or remove certain attributes. *epages6 *epagesNow <br><br>
        *Supported JSON-PATCH operations*<br> - add (sets or replaces an attribute)<br> - remove (unsets an attribute)<br> - replace³ (replaces an attribute value)<br><br>
        *Attribute paths that allow updates via PATCH* <br> - /productNumber¹<br> - /name<br> - /shortDescription<br> - /description<br> - /manufacturer<br> - /upc<br> - /ean<br> - /essentialFeatures<br> - /searchKeywords<br> - /priceInfo/price/amount<br> - /priceInfo/manufacturerPrice/amount<br> - /priceInfo/depositPrice/amount<br> - /customerSpecificPriceInfo¹<br> - /bulkPriceInfo<br> - /deliveryPeriod<br> - /deliveryWeight<br> - /minStocklevel<br> - /manufacturerProductNumber<br> - /productLength<br> - /productWidth<br> - /productHeight<br> - /producttype³<br> - /priceInfo/taxClass/taxClassId³<br> - /productImage⁴<br> - /stocklevel²³<br> - /visible¹<br> - /isNew<br> - /newnessDate<br> - /video<br> - /isVATInfoVisible<br> - /isManufacturerPriceRRP<br> - /referencePriceInfo<br> - /isShippingLinkVisible<br> - /customisationInfo<br> - /title<br> - /productDataSheet<br> - /shippingMethodsRestrictedTo<br> - /productCode<br> - /orderUnitInfo¹<br><br>
        **¹** supports *add* only<br> **²** value will not be replaced, but changed, i.e. if the stocklevel is 3 and you add 1, you will get 4; if you add -5, you will get -2.<br> **³** used for producttype, taxClassId, stocklevel<br> **⁴** can only be used to determine the slideshow image that should serve as the main image for the product. To upload images to the slideshow, refer to [the respective POST endpoint](https://developer.epages.com/apps/api-reference/post-shopid-products-productid-slideshow.html).<br><br>
