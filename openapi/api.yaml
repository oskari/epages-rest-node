  /{shopId}/products/{productId}/custom-attributes:
    x-amf-displayName: Custom attributes
    get:
      description: Returns values of user-defined product attributes. *epages6 *epagesNow
      parameters:
        - name: locale
          required: false
          in: query
          schema:
            description: Represents the language code according to ISO 639-1 and the country code according to ISO 3166-1. If not provided, the shop's default language is used. We recommend to always send this parameter with your request. If the default language had been changed in the administration, it might take up to 1 day until this change affects the shop.
            example: en_US
            type: string
        - name: shopId
          in: path
          schema:
            description: The unique identifier of the shop.
            example: DemoShop
            type: string
        - name: productId
          in: path
          schema:
            description: The unique identifier of the product.
            example: 52F221E0-36F6-DC4E-384A-AC1504050C04
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                title: GET Custom Attributes Schema
                example:
                  value:
                    items:
                      - key: Color
                        displayKey: Color
                        singleValue: true
                        type: string
                        values:
                          - value: Black
                            displayValue: Black
                      - key: Key
                        displayKey: Key Features
                        singleValue: false
                        type: string
                        values:
                          - value: wireless
                            displayValue: Wireless / Cordless
                          - value: blue
                            displayValue: Bluetooth
                          - value: sursound
                            displayValue: Surround Sound
                          - value: onear
                            displayValue: On-Ear
                type: object
                additionalProperties: true
                properties:
                  items:
                    description: Information related to a product that can be assigned to describe it in more detail. This information can have a specific type, e.g. a decimal number, and can be set to be visible in the administration area of the shop so that it is displayed with the product. It can also be specified as an additional filter criterion in the shop.
      security:
        - products_read: []
    patch:
      description: |-
        Updates information on the custom attributes for a single product with partial data according to [RFC 6902](https://tools.ietf.org/html/rfc6902). You can either add or remove assignments. *epagesNow <br><br>
        *Supported JSON-PATCH operations*<br> - add (sets or replaces an attribute value)<br> - remove (unsets an attribute)<br><br>
      parameters:
        - name: locale
          required: false
          in: query
          schema:
            description: Represents the language code according to ISO 639-1 and the country code according to ISO 3166-1. If not provided, the shop's default language is used. We recommend to always send this parameter with your request. If the default language had been changed in the administration, it might take up to 1 day until this change affects the shop.
            example: en_US
            type: string
        - name: shopId
          in: path
          schema:
            description: The unique identifier of the shop.
            example: DemoShop
            type: string
        - name: productId
          in: path
          schema:
            description: The unique identifier of the product.
            example: 52F221E0-36F6-DC4E-384A-AC1504050C04
            type: string
      requestBody:
        content:
          application/json:
            schema:
              title: PATCH Custom Attributes Request Schema
              example:
                value:
                  - op: add
                    path: /
                    value:
                      key: Color
                      displayValue: red
                  - op: remove
                    path: /
                    value:
                      key: Additional information
              type: object
              additionalProperties: true
              properties:
                '':
                  description: ''
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                title: PATCH Custom Attributes Schema
                example:
                  value:
                    items:
                      - displayKey: Additional information
                        singleValue: true
                        values:
                          - displayValue: ''
                            value: null
                        type: string
                        key: Additional information
                      - displayKey: Color
                        singleValue: true
                        values:
                          - displayValue: red
                            value: red
                        type: string
                        key: Color
                type: object
                additionalProperties: true
                properties:
                  items:
                    description: Information related to a product that can be assigned to describe it in more detail. This information can have a specific type, e.g. a decimal number, and can be set to be visible in the administration area of the shop so that it is displayed with the product. It can also be specified as an additional filter criterion in the shop.
      security:
        - products_write: []
