        - description: The unique identifier of the cart.
          in: path
          name: cartId
          required: true
          schema:
            type: string
      responses:
        '201':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [cart](page:apps-data-types#cart)'
                title: Post Carts CartId LineItem Schema
                type: object
          description: Created
      description: Creates multiple product line items in a cart. *epages6 *epagesNow
      requestBody:
        content:
          application/json:
            schema:
              properties:
                '':
                  description: ''
                  type: 'array of [productLineItem (create request)](page:apps-data-types#productlineitem-create-request)'
              title: Post Carts CartId LineItems Request Schema
              type: object
        required: true
  '/{shopId}/carts/{cartId}/order':
    post:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - description: The unique identifier of the cart.
          in: path
          name: cartId
          required: true
          schema:
            type: string
      responses:
        '201':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [order](page:apps-data-types#order)'
                title: Post Cart CartId Order Schema
                type: object
          description: Created
      description: Creates an order that is valid at the time of cart creation. It won't be validated again while processing the actual request. Billing address has to be available in the cart before creating an order. The request body for this REST call remains empty. *epages6 *epagesNow
  '/{shopId}/carts/{cartId}/payment-data':
    put:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - description: The unique identifier of the cart.
          in: path
          name: cartId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [cart](page:apps-data-types#cart)'
                title: Put Carts CartId PaymentData Schema
                type: object
          description: OK
      description: 'Modifies the payment data for a cart.<br><br>Please note that by providing the attribute `name` in the request body, the attributes `paymentMethod` and `transactionId` included in `paymentData` will be set to `null`. The provided name will not be included in the response. Instead, it will be displayed as the payment method used for the related order in the administration area of the merchant.<br><br>If the attribute `priceAmount` is provided in the request, the price included in `paymentData` will be changed to the given amount. If the attribute `priceAmount` is not provided in the request, the price will be set to `0`. *epages6 *epagesNow'
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  description: 'The name of the payment method.<br>Required: `true`'
                  type: string
                priceAmount:
                  description: 'The costs or the discount for the payment method.<br>Required: `false`'
                  type: number
              title: Put Carts CartId PaymentData Request Schema
              type: object
        required: true
  '/{shopId}/carts/{cartId}/shipping-address':
    delete:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
