            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [cart](page:apps-data-types#cart)'
                title: Put Carts LineItems LineItemId ProductPrice Schema
                type: object
          description: OK
      description: Modifies the price of a specific product line item in a cart. *epages6 *epagesNow
      requestBody:
        content:
          application/json:
            schema:
              properties:
                '':
                  description: ''
                  type: 'object of [productLineItemPrice (update request)](page:apps-data-types#productlineitemprice-update-request)'
              title: Put Carts LineItems LineItemId ProductPrice Request Schema
              type: object
        required: true
  '/{shopId}/carts/{cartId}/multi-line-items':
    post:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
