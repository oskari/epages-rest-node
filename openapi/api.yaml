        - name: categoryId
          required: false
          in: query
          schema:
            description: Filters products by category ID.
            type: string
        - name: page
          in: query
          schema:
            description: Represents the current page.
            default: 1
            type: integer
            minimum: 1
        - name: direction
          in: query
          schema:
            description: Specifies the sorting direction, which can be either ascending or descending.
            enum:
              - asc
              - desc
            type: string
        - name: locale
          required: false
          in: query
          schema:
            description: Represents the language code according to ISO 639-1 and the country code according to ISO 3166-1. If not provided, the shop's default language is used. We recommend to always send this parameter with your request. If the default language had been changed in the administration, it might take up to 1 day until this change affects the shop.
            example: en_US
            type: string
        - name: id
          required: false
          in: query
          schema:
            type: array
            items:
              description: |-
                The ID of the product.<br/>
                The query parameter is repeatable up to 12 times, e.g. "?id=productId1&id=productId2&id=productId3".<br/> The response will return the product data in the same order as the IDs. Invisible, deleted or unknown products are removed from the list.<br/>
                This parameter can only be used together with the locale and currency query parameters. Other query parameters, such as sort, categoryId, page etc, are not supported.
              type: string
        - name: q
          required: false
          in: query
          schema:
            description: |-
              Filters products by a query string that can be either<br><br>
