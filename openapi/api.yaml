openapi: 3.0.0
info:
  title: ePages Public REST API
  version: v1
servers:
  - url: /rs
paths:
  '/{shopId}':
    get:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - description: 'Represents the language code according to ISO 639-1 and the country code according to ISO 3166-1. If not provided, the shop''s default language is used. We recommend to always send this parameter with your request. If the default language had been changed in the administration, it might take up to 1 day until this change affects the shop.'
          in: query
          name: locale
          required: false
          schema:
            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [shopInfo](page:apps-data-types#shopinfo)'
                title: Get ShopId Schema
                type: object
          description: OK
      description: 'Returns the public information of a shop, like name, slogan and logo. *epages6 *epagesNow'
  '/{shopId}/carts':
    get:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - description: Represents the current page.
          in: query
          name: page
          schema:
            default: 1
            minimum: 1
            type: integer
        - description: Specifies the maximum number of results per page.
          in: query
          name: resultsPerPage
          schema:
            default: 10
            maximum: 100
            type: integer
        - description: 'Represents the language code according to ISO 639-1 and the country code according to ISO 3166-1. If not provided, the shop''s default language is used. We recommend to always send this parameter with your request. If the default language had been changed in the administration, it might take up to 1 day until this change affects the shop.'
          in: query
          name: locale
          required: false
          schema:
            type: string
        - description: 'Filters carts created before this timestamp (format according to ISO 8601). The maximum time frame for displaying carts is 30 days. If no filter is set, all carts will be displayed.'
          in: query
          name: createdBefore
          required: false
          schema:
            type: string
        - description: 'Filters carts created after this timestamp (format according to ISO 8601). The maximum time frame for displaying carts is 30 days. If no filter is set, all carts will be displayed.'
          in: query
          name: createdAfter
          required: false
          schema:
            type: string
        - description: 'Returns carts that hold address data. If set to `false`, only the carts without address will be returned. If parameter is not set, all carts will be returned.'
          in: query
          name: hasAddressData
          required: false
          schema:
            type: boolean
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  items:
                    description: The list of all carts.
                    type: 'array of [cart](page:apps-data-types#cart)'
                  page:
                    description: The page number on which the cart appears.
                    type: integer
                  results:
                    description: The number of carts in total.
                    type: integer
                  resultsPerPage:
                    description: The number of carts returned per page.
                    type: integer
                title: Get Carts Schema
                type: object
          description: OK
      description: Returns a list of carts. *epages6 *epagesNow
    post:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
      responses:
        '201':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [cart](page:apps-data-types#cart)'
                title: Post Carts CartId Schema
                type: object
          description: Created
      description: Creates a cart for a shop. *epages6 *epagesNow
      requestBody:
        content:
          application/json:
            schema:
              properties:
                '':
                  description: ''
                  type: 'object of [cart (create request)](page:apps-data-types#cart-create-request)'
              title: Post Carts Request Schema
              type: object
        required: true
  '/{shopId}/carts/{cartId}':
    get:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - description: The unique identifier of the cart.
          in: path
          name: cartId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [cart](page:apps-data-types#cart)'
                title: Get Carts CartId Schema
                type: object
          description: OK
      description: Returns a specific cart from a shop identified by the provided cart Id. *epages6 *epagesNow
  '/{shopId}/carts/{cartId}/billing-address':
    delete:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - description: The unique identifier of the cart.
          in: path
          name: cartId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [cart](page:apps-data-types#cart)'
                title: Delete Carts CartID Billing Schema
                type: object
          description: OK
      description: Deletes the billing address from a cart. *epages6 *epagesNow
    put:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - description: The unique identifier of the cart.
          in: path
          name: cartId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [cart](page:apps-data-types#cart)'
                title: Put Carts CartId Billing Schema
                type: object
          description: OK
      description: Modifies the billing address for a cart. *epages6 *epagesNow
      requestBody:
        content:
          application/json:
            schema:
              properties:
                '':
                  description: ''
                  type: 'object of [address](page:apps-data-types#address)'
              title: Put Carts CartId BillingAddress Request Schema
              type: object
        required: true
  '/{shopId}/carts/{cartId}/coupon':
    post:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - description: The unique identifier of the cart.
          in: path
          name: cartId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [cart](page:apps-data-types#cart)'
                title: Post Carts CartId Coupon Schema
                type: object
          description: OK
      description: Applies a coupon code on a cart which results in creating a couponLineItem and a link to remove the coupon. *epages6
  '/{shopId}/carts/{cartId}/coupon/{couponLineItemId}':
    delete:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - description: The unique identifier of the cart.
          in: path
          name: cartId
          required: true
          schema:
            type: string
        - in: path
          name: couponLineItemId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [cart](page:apps-data-types#cart)'
                title: Delete Carts CartId Coupon CouponLinItemId Schema
                type: object
          description: OK
      description: Deletes a coupon line item from a specific cart and recalculates cart. The link to add a coupon appears in the links section. *epages6
  '/{shopId}/carts/{cartId}/line-items':
    post:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - description: The unique identifier of the cart.
          in: path
          name: cartId
          required: true
          schema:
            type: string
      responses:
        '201':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [cart](page:apps-data-types#cart)'
                title: Post Carts CartId LineItem Schema
                type: object
          description: Created
      description: Creates a product line item in a cart. *epages6 *epagesNow
      requestBody:
        content:
          application/json:
            schema:
              properties:
                '':
                  description: ''
                  type: 'object of [productLineItem (create request)](page:apps-data-types#productlineitem-create-request)'
              title: Post Carts CartId LineItems Request Schema
              type: object
        required: true
  '/{shopId}/carts/{cartId}/line-items/{lineItemId}':
    delete:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - description: The unique identifier of the cart.
          in: path
          name: cartId
          required: true
          schema:
            type: string
        - in: path
          name: lineItemId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [cart](page:apps-data-types#cart)'
                title: Delete Carts CartId LineItem LineItemId Schema
                type: object
          description: OK
      description: Deletes a specific product line item from a cart. *epages6 *epagesNow
    put:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - description: The unique identifier of the cart.
          in: path
          name: cartId
          required: true
          schema:
            type: string
        - in: path
          name: lineItemId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [cart](page:apps-data-types#cart)'
                title: Put Carts CartId LineItem LineItemId Schema
                type: object
          description: OK
      description: Modifies a specific product line item in a cart. *epages6 *epagesNow
      requestBody:
        content:
          application/json:
            schema:
              properties:
                '':
                  description: ''
                  type: 'object of [productLineItem (update request)](page:apps-data-types#productlineitem-update-request)'
              title: Put Carts LineItems LineItemId Request Schema
              type: object
        required: true
  '/{shopId}/carts/{cartId}/line-items/{lineItemId}/product-price':
    put:
      parameters:
        - description: The unique identifier of the shop.
