      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [category](page:apps-data-types#category)'
                title: Get Categories CategoryId Schema
                type: object
          description: OK
      description: Returns the category identified by the provided category ID. *epages6 *epagesNow
    post:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - in: path
          name: categoryId
          required: true
