    patch:
      description: |-
        Updates information for a single product type with partial data according to [RFC 6902](https://tools.ietf.org/html/rfc6902). You can either add or remove certain attributes. *epagesNow <br><br>
        *Supported JSON-PATCH operations*<br> - add (sets an attribute)<br> - remove (unsets an attribute)<br>

        *Attribute paths that allow updates via PATCH* <br> - /attribute¹<br> - /attributevalues²<br>

        **¹** supports *remove* only<br> **²** Attribute will be created if it does not exist yet.<br>
      parameters:
        - name: locale
          required: false
          in: query
          schema:
            description: Represents the language code according to ISO 639-1 and the country code according to ISO 3166-1. If not provided, the shop's default language is used. We recommend to always send this parameter with your request. If the default language had been changed in the administration, it might take up to 1 day until this change affects the shop.
            example: en_US
            type: string
        - name: shopId
          in: path
          schema:
            description: The unique identifier of the shop.
            example: DemoShop
            type: string
        - name: productTypeId
          required: true
          in: path
          schema:
            type: string
      requestBody:
        content:
          application/json-patch+json:
            schema:
              title: PATCH Product Type Request Schema
              example:
                value:
                  - op: add
                    path: /attributevalues
                    value:
                      name: Connectivity
                      visible: true
                      preDefAttribute: true
                      values:
                        - value: True Wireless
                          name: True Wireless
                  - op: add
                    path: /attributevalues
                    value:
                      name: Usage
                      values:
                        - name: Studio recording
                        - name: TV
                        - name: Drumming
                        - name: Gaming
                  - op: remove
                    path: /attribute
                    value:
                      name: Type
              type: object
              additionalProperties: true
              properties:
                '':
                  description: ''
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                title: PATCH Product Type Schema
                example:
                  value:
                    name: Headphones
                    productTypeId: 64180BCB-5AEF-4E69-4A92-AC150003B611
                    attributes:
                      - visible: true
                        name: Connectivity
                        values:
                          - value: Bluetooth
                            name: Bluetooth
                          - value: Wired
                            name: Wired
                          - value: True Wireless
                            name: True Wireless
                        preDefAttribute: true
                      - visible: false
                        name: Usage
                        values:
                          - value: Studio recording
                            name: Studio recording
                          - value: TV
                            name: TV
                          - value: Drumming
                            name: Drumming
                          - value: Gaming
                            name: Gaming
                        preDefAttribute: true
                    alias: Headphones
                type: object
                additionalProperties: true
                properties:
                  '':
                    description: ''
      security:
        - products_write: []
  /{shopId}/sales:
    x-amf-displayName: Sales
    get:
      description: Returns the summary of sales figures for a specified product or for the shop grouped by currencies. The amounts are gross and net amounts. By default the results of the last 30 days are displayed. Open-ended queries are limited to 30 days. The maximum time frame for displaying orders is 1 year. *epages6 *epagesNow
      parameters:
        - name: createdBefore
          required: false
          in: query
          schema:
            description: Filters orders created before this timestamp (format according to ISO 8601). The maximum time frame for displaying orders is 1 year. If no filter is set, all orders will be displayed.
            type: string
        - name: createdAfter
          required: false
          in: query
          schema:
            description: Filters orders created after this timestamp (format according to ISO 8601). The maximum time frame for displaying orders is 1 year. If no filter is set, all orders will be displayed.
            type: string
        - name: productId
          required: false
          in: query
          schema:
            description: The unique identifier of the product.
            type: string
        - name: shopId
          in: path
          schema:
            description: The unique identifier of the shop.
            example: DemoShop
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                title: Get Product Sales Schema
                example:
                  createdAfter: 2016-03-20T08:21:43.779Z
                  createdBefore: 2016-04-19T07:21:43.779Z
                  salesPerCurrency:
                    - currency: EUR
                      totalGrossRevenue: 9.99
                      totalNetRevenue: 8.39495798319328
                      unitsSold: 1
                      totalOrders: 1
                type: object
                additionalProperties: true
                properties:
                  '':
                    description: ''
        '400':
          description: Query parameter validations errors. Invalid date format or date range longer than one year.
        '403':
          description: Forbidden. OAuth 2.0 Token required with 'orders_read' scope.
