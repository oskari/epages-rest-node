          name: cartId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [cart](page:apps-data-types#cart)'
                title: Delete Carts CartId Shipping Schema
                type: object
          description: OK
      description: Deletes the shipping address from a cart. *epages6 *epagesNow
    put:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - description: The unique identifier of the cart.
          in: path
          name: cartId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [cart](page:apps-data-types#cart)'
                title: Put Carts CartId Shipping Schema
                type: object
          description: OK
      description: Modifies the shipping address for a cart. *epages6 *epagesNow
      requestBody:
        content:
          application/json:
            schema:
              properties:
                '':
                  description: ''
                  type: 'object of [address](page:apps-data-types#address)'
              title: Put Carts CartId ShippingAddress Request Schema
              type: object
        required: true
  '/{shopId}/carts/{cartId}/shipping-data':
    put:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - description: The unique identifier of the cart.
          in: path
          name: cartId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'object of [cart](page:apps-data-types#cart)'
                title: Put Carts CartId ShippingData Schema
                type: object
          description: OK
      description: Modifies the shipping data for a cart. *epages6 *epagesNow
      requestBody:
        content:
          application/json:
            schema:
              properties:
                id:
                  description: 'The unique identifier of the shipping method.<br>Required: `true`'
                  type: string
                priceAmount:
                  description: 'The costs for the shipping.<br>Required: `false`'
                  type: number
              title: Put Carts CartId ShippingData Request Schema
              type: object
        required: true
  '/{shopId}/categories':
    get:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - description: 'Represents the language code according to ISO 639-1 and the country code according to ISO 3166-1. If not provided, the shop''s default language is used. We recommend to always send this parameter with your request. If the default language had been changed in the administration, it might take up to 1 day until this change affects the shop.'
          in: query
          name: locale
          required: false
          schema:
            type: string
        - description: Filters categories by product ID.
          in: query
          name: productId
          required: false
          schema:
            type: string
        - description: Includes invisible categories. Only available with `products_write` authorisation.
          in: query
          name: includeInvisible
          required: false
          schema:
            type: boolean
      responses:
        '200':
          content:
            '*/*':
              schema:
                properties:
                  '':
                    description: ''
                    type: 'array of [category](page:apps-data-types#category)'
                title: Get Categories Schema
                type: object
          description: OK
      description: |
        Returns the product categories of the shop. This usually is the default root category "Categories",
        but can also include additional root categories, if supported by the shop. *epages6 *epagesNow
  '/{shopId}/categories/{categoryId}':
    delete:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - in: path
          name: categoryId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content
      description: Deletes a category identified by the provided category ID. *epages6
    get:
      parameters:
        - description: The unique identifier of the shop.
          in: path
          name: shopId
          required: true
          schema:
            type: string
        - in: path
          name: categoryId
          required: true
