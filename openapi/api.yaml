            type: boolean
        - name: invoicedOn
          required: false
          in: query
          schema:
            description: Returns orders where the status Invoiced is set.
            type: boolean
        - name: createdAfter
          required: false
          in: query
          schema:
            description: Filters orders created after this timestamp (format according to ISO 8601). The maximum time frame for displaying orders is 1 year. If no filter is set, all orders will be displayed.
            type: string
        - name: lastUpdated
          required: false
          in: query
          schema:
            description: Sort by last updated orders.
            type: boolean
        - name: pendingOn
          required: false
          in: query
          schema:
            description: Returns orders where the status Pending is set.
            type: boolean
        - name: page
          in: query
          schema:
            description: Represents the current page.
            default: 1
            type: integer
            minimum: 1
        - name: dispatchedOn
          required: false
          in: query
          schema:
            description: Returns orders where the status Dispatched is set.
            type: boolean
        - name: locale
          required: false
          in: query
          schema:
            description: Represents the language code according to ISO 639-1 and the country code according to ISO 3166-1. If not provided, the shop's default language is used. We recommend to always send this parameter with your request. If the default language had been changed in the administration, it might take up to 1 day until this change affects the shop.
            example: en_US
            type: string
        - name: createdBefore
          required: false
          in: query
          schema:
            description: Filters orders created before this timestamp (format according to ISO 8601). The maximum time frame for displaying orders is 1 year. If no filter is set, all orders will be displayed.
            type: string
        - name: closedOn
          required: false
          in: query
          schema:
            description: Returns orders where the status Closed is set.
            type: boolean
        - name: customerId
          required: false
          in: query
          schema:
            description: The unique identifier of the customer.
            type: string
        - name: paidOn
          required: false
          in: query
          schema:
            description: Returns orders where the status Paid is set.
            type: boolean
        - name: resultsPerPage
          in: query
          schema:
            description: Specifies the maximum number of results per page.
            default: 10
            type: integer
            maximum: 100
        - name: currency
          required: false
          in: query
          schema:
            description: Represents the currency code for the order according to ISO 4217.
            type: string
        - name: rejectedOn
          required: false
          in: query
          schema:
            description: Returns orders where the status Rejected is set.
            type: boolean
